<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub 仓库监控服务</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }

        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #4b5563;
        }

        .panel {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            padding: 24px;
            margin-bottom: 24px;
        }

        .panel h2 {
            margin-top: 0;
            font-size: 20px;
        }

        .grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            align-items: start;
        }

        .grid.full-width {
            grid-column: 1 / -1;
        }

        .grid > div {
            min-width: 0;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }

        .inline-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .inline-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #2563eb;
            color: #ffffff;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            color: #111827;
            background: #f9fafb;
            font-weight: 700;
        }

        tr:hover {
            background: #f3f4f6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-ok {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-warn {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(31, 41, 55, 0.95);
            color: #ffffff;
            padding: 16px 20px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.2);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .toast.visible {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>GitHub 仓库监控服务</h1>
            <p>管理多个项目、自动检查远程仓库更新，并支持邮件/SMS 警报。</p>
        </div>

        <div class="panel">
            <h2>项目配置</h2>
            <div class="grid">
                <div>
                    <label for="projectId">项目 ID</label>
                    <input id="projectId" placeholder="唯一标识，如 project-1" />
                </div>
                <div>
                    <label for="projectName">项目名称</label>
                    <input id="projectName" placeholder="显示名称" />
                </div>
                <div>
                    <label for="repoUrl">GitHub 仓库 URL</label>
                    <input id="repoUrl" placeholder="https://github.com/owner/repo.git" />
                </div>
                <div>
                    <label for="branch">分支</label>
                    <input id="branch" placeholder="master 或 main" />
                </div>
                <div>
                    <label for="checkInterval">检查间隔 (秒)</label>
                    <input id="checkInterval" type="number" min="10" placeholder="60" />
                </div>
                <div>
                    <label for="monitorEnabled">监控启用</label>
                    <div class="inline-checkbox">
                        <input id="monitorEnabled" type="checkbox" />
                        <span>启用</span>
                    </div>
                </div>
                <div>
                    <label for="emailRecipients">邮件接收人</label>
                    <input id="emailRecipients" placeholder="a@example.com,b@example.com" />
                </div>
                <div class="full-width">
                    <label for="smsRecipients">短信接收人</label>
                    <input id="smsRecipients" placeholder="+8613712345678, ..." />
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="saveProject()">保存项目</button>
                <button class="btn btn-secondary" onclick="clearForm()">重置表单</button>
                <button class="btn btn-secondary" onclick="loadProjects()">刷新项目</button>
            </div>
        </div>

        <div class="panel">
            <h2>当前项目列表</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>名称</th>
                            <th>仓库</th>
                            <th>分支</th>
                            <th>间隔</th>
                            <th>启用</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="projectTable"></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h2>服务状态</h2>
            <p>事件流自动更新项目状态，触发检查或保存后可看到最新结果。</p>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>项目 ID</th>
                            <th>状态</th>
                            <th>新增提交</th>
                            <th>新增</th>
                            <th>修改</th>
                            <th>删除</th>
                            <th>警报</th>
                            <th>上次检查</th>
                        </tr>
                    </thead>
                    <tbody id="stateTable"></tbody>
                </table>
            </div>
        </div>

        <div class="panel">
            <h2>邮件发送记录</h2>
            <div class="actions">
                <button class="btn btn-secondary" onclick="clearMailLogs()">清空日志</button>
                <button class="btn btn-secondary" onclick="loadMailLogs()">刷新日志</button>
            </div>
            <div class="table-wrapper" style="margin-top: 16px;">
                <table>
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>主题</th>
                            <th>收件人</th>
                            <th>状态</th>
                            <th>错误</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="mailLogTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const projectTable = document.getElementById('projectTable');
        const stateTable = document.getElementById('stateTable');
        const mailLogTable = document.getElementById('mailLogTable');
        const toast = document.getElementById('toast');

        async function loadProjects() {
            const response = await fetch('/api/projects');
            const projects = await response.json();
            projectTable.innerHTML = projects.map(project => {
                return `
                    <tr>
                        <td>${project.id || ''}</td>
                        <td>${project.name || ''}</td>
                        <td>${project.repo_url || ''}</td>
                        <td>${project.branch || ''}</td>
                        <td>${project.check_interval || ''}</td>
                        <td>${project.monitor_enabled ? '是' : '否'}</td>
                        <td>
                            <button class="btn btn-secondary" onclick="editProject('${project.id}')">编辑</button>
                            <button class="btn btn-secondary" onclick="deleteProject('${project.id}')">删除</button>
                            <button class="btn btn-secondary" onclick="checkProject('${project.id}')">检查</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function loadState() {
            const response = await fetch('/api/state');
            const state = await response.json();
            stateTable.innerHTML = Object.entries(state).map(([projectId, projectState]) => {
                const badgeClass = projectState.alert_sent ? 'badge-error' : projectState.status === 'changed' ? 'badge-warn' : 'badge-ok';
                return `
                    <tr>
                        <td>${projectId}</td>
                        <td><span class="badge ${badgeClass}">${projectState.status || 'unknown'}</span></td>
                        <td>${projectState.new_commits || 0}</td>
                        <td>${projectState.added_files || 0}</td>
                        <td>${projectState.modified_files || 0}</td>
                        <td>${projectState.deleted_files || 0}</td>
                        <td>${projectState.alert_sent ? '是' : '否'}</td>
                        <td>${projectState.last_check ? new Date(projectState.last_check).toLocaleString() : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        function clearForm() {
            document.getElementById('projectId').value = '';
            document.getElementById('projectName').value = '';
            document.getElementById('repoUrl').value = '';
            document.getElementById('branch').value = '';
            document.getElementById('checkInterval').value = '';
            document.getElementById('monitorEnabled').checked = true;
            document.getElementById('emailRecipients').value = '';
            document.getElementById('smsRecipients').value = '';
        }

        function editProject(id) {
            fetch('/api/projects')
                .then(r => r.json())
                .then(projects => {
                    const project = projects.find(item => item.id === id);
                    if (!project) return;
                    document.getElementById('projectId').value = project.id || '';
                    document.getElementById('projectName').value = project.name || '';
                    document.getElementById('repoUrl').value = project.repo_url || '';
                    document.getElementById('branch').value = project.branch || '';
                    document.getElementById('checkInterval').value = project.check_interval || '';
                    document.getElementById('monitorEnabled').checked = project.monitor_enabled !== false;
                    document.getElementById('emailRecipients').value = Array.isArray(project.email_recipients) ? project.email_recipients.join(',') : project.email_recipients || '';
                    document.getElementById('smsRecipients').value = Array.isArray(project.sms_recipients) ? project.sms_recipients.join(',') : project.sms_recipients || '';
                });
        }

        async function saveProject() {
            const project = {
                id: document.getElementById('projectId').value.trim(),
                name: document.getElementById('projectName').value.trim(),
                repo_url: document.getElementById('repoUrl').value.trim(),
                branch: document.getElementById('branch').value.trim() || 'master',
                check_interval: Number(document.getElementById('checkInterval').value) || 60,
                monitor_enabled: document.getElementById('monitorEnabled').checked,
                email_recipients: document.getElementById('emailRecipients').value.split(',').map(x => x.trim()).filter(Boolean),
                sms_recipients: document.getElementById('smsRecipients').value.split(',').map(x => x.trim()).filter(Boolean),
            };

            if (!project.id || !project.repo_url) {
                showToast('请填写项目 ID 和仓库 URL');
                return;
            }

            const response = await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(project)
            });
            if (!response.ok) {
                const data = await response.json();
                showToast(data.error || '保存失败');
                return;
            }
            showToast('项目配置已保存');
            await loadProjects();
            await loadState();
            clearForm();
        }

        async function deleteProject(id) {
            const response = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                showToast('删除失败');
                return;
            }
            showToast('项目已删除');
            await loadProjects();
            await loadState();
        }

        async function loadMailLogs() {
            const response = await fetch('/api/mail_logs');
            if (!response.ok) {
                mailLogTable.innerHTML = '<tr><td colspan="6">无法加载日志</td></tr>';
                return;
            }
            const logs = await response.json();
            mailLogTable.innerHTML = logs.map(entry => {
                return `
                    <tr>
                        <td>${new Date(entry.time).toLocaleString()}</td>
                        <td>${entry.subject || ''}</td>
                        <td>${(entry.recipients || []).join(', ')}</td>
                        <td>${entry.status || ''}</td>
                        <td>${entry.error || ''}</td>
                        <td><button class="btn btn-secondary" onclick="deleteMailLog('${entry.id}')">删除</button></td>
                    </tr>
                `;
            }).join('');
        }

        async function clearMailLogs() {
            const response = await fetch('/api/mail_logs', { method: 'DELETE' });
            if (!response.ok) {
                showToast('清空日志失败');
                return;
            }
            showToast('邮件日志已清空');
            await loadMailLogs();
        }

        async function deleteMailLog(id) {
            const response = await fetch(`/api/mail_logs/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                showToast('删除日志失败');
                return;
            }
            showToast('日志记录已删除');
            await loadMailLogs();
        }

        async function checkProject(id) {
            const response = await fetch(`/api/check/${id}`, { method: 'POST' });
            if (!response.ok) {
                showToast('检查请求失败');
                return;
            }
            const result = await response.json();
            showToast(`检查完成: ${result.status}`);
            await loadState();
            await loadMailLogs();
        }

        function setupEvents() {
            const eventSource = new EventSource('/api/events');
            eventSource.onmessage = async () => {
                await loadState();
                await loadMailLogs();
            };
            eventSource.onerror = () => {
                console.warn('事件流已断开，稍后将自动重连');
            };
        }

        loadProjects();
        loadState();
        loadMailLogs();
        setupEvents();
    </script>
</body>
</html>
